name: MotoGame
options:
  bundleIdPrefix: com.motogame
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  MotoGame:
    type: application
    platform: iOS
    sources:
      - path: MotoGame
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.motogame.MotoGame
        INFOPLIST_FILE: MotoGame/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_INTERFACE_ORIENTATIONS_IPHONE: UIInterfaceOrientationPortrait
        SUPPORTED_INTERFACE_ORIENTATIONS_IPAD: UIInterfaceOrientationPortrait
    dependencies:
      - sdk: SpriteKit.framework
    scheme:
      testTargets: []
